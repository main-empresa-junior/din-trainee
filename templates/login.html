{% extends "base.html" %}

{% block title %}Login - UEM DIN{% endblock %}

{% block nav %}
<nav>
    <a href="/">Início</a>
    <a href="/register" class="nav-btn-login">Cadastrar</a>
</nav>
{% endblock nav %}

{% block content %}
<div class="form-section">
    <div class="form-card">
        <h2>Entrar</h2>
        <p class="form-card-sub">Acesse o portal com suas credenciais institucionais</p>
        <form method="post" action="/login">
            <div class="form-group">
                <label for="email">E-mail Institucional</label>
                <input type="email" id="email" name="email" placeholder="exemplo@uem.br"
                       pattern="[a-zA-Z0-9._%+\-]+@uem\.br$"
                       title="Use seu e-mail institucional @uem.br"
                       required>
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="********"
                       minlength="8"
                       required>
            </div>
            <button type="submit" class="btn-submit">Entrar no Sistema</button>
        </form>
        <p class="form-footer-text">Não tem conta? <a href="/register">Cadastre-se aqui</a></p>
    </div>
</div>
{% endblock content %}
